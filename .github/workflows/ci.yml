name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [staging, main]

jobs:
  # ── Backend ───────────────────────────────────────────────────────────────────
  test-api:
    name: API — Lint + Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: expressforge_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: pip install -r apps/api/requirements-dev.txt

      - name: Lint (Ruff)
        run: cd apps/api && ruff check .

      - name: Format check (Black)
        run: cd apps/api && black --check .

      - name: Run tests
        env:
          ENVIRONMENT: test
          DATABASE_URL: postgresql://postgres:test@localhost:5432/expressforge_test
          REDIS_URL: redis://localhost:6379
          AI_ENABLED: "false"
          JWT_SECRET: ci-test-secret-not-used-in-production
          ENCRYPTION_KEY: ${{ secrets.CI_ENCRYPTION_KEY }}
          TOTP_ENCRYPTION_KEY: ${{ secrets.CI_TOTP_ENCRYPTION_KEY }}
          RESEND_API_KEY: re_test_placeholder
          EMAIL_FROM: test@expressforge.dev
          APP_URL: http://localhost:3000
        run: cd apps/api && pytest tests/ -v --cov=app --cov-report=term-missing

  # ── Frontend ─────────────────────────────────────────────────────────────────
  test-web:
    name: Web — Lint + TypeCheck + Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: cd apps/web && npm ci

      - name: Lint
        run: cd apps/web && npm run lint

      - name: Type check
        run: cd apps/web && npm run typecheck

      - name: Build
        run: cd apps/web && npm run build
        env:
          NEXT_PUBLIC_API_URL: https://expressforge-api-staging.onrender.com
